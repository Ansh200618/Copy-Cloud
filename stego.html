<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Stego Tool - Copy Cloud</title>
    <meta name="description" content="E2EE Steganography tool – hide secret messages inside images and text using robust block-stego and AES-GCM encryption. 100% client-side.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        (function () {
            try {
                const s = JSON.parse(localStorage.getItem('copyCloudTheme') || 'null');
                if (s) {
                    const dark = s.mode === 'dark' ? true : s.mode === 'light' ? false : window.matchMedia('(prefers-color-scheme: dark)').matches;
                    if (!dark) document.documentElement.classList.add('light-mode');
                    const a = s.accent || 'indigo';
                    if (a !== 'indigo') document.documentElement.setAttribute('data-accent', a);
                    const DARK_BODY_BG = {indigo:'#0b0d1e',purple:'#100819',blue:'#080e1f'};
                    const LIGHT_BODY_BG = {indigo:'#f0f2ff',purple:'#f7f0ff',blue:'#eff6ff'};
                    const DARK_OVERLAY  = {indigo:'linear-gradient(135deg,#0b0d1e,#0f172a,#090b1c)'};
                    const LIGHT_OVERLAY = {indigo:'linear-gradient(135deg,#e8eaff,#f5f6ff,#e8eaff)'};
                    const h = document.documentElement;
                    h.style.setProperty('--page-bg', dark ? (DARK_BODY_BG[a]||DARK_BODY_BG.indigo) : (LIGHT_BODY_BG[a]||LIGHT_BODY_BG.indigo));
                    h.style.setProperty('--overlay-bg', dark ? (DARK_OVERLAY[a]||DARK_OVERLAY.indigo) : (LIGHT_OVERLAY[a]||LIGHT_OVERLAY.indigo));
                }
            } catch (e) {}
        })();
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: var(--page-bg) !important; }
        :root {
            --accent-from: #6366f1; --accent-to: #9333ea; --accent-500: #818cf8; --accent-400: #a5b4fc; --accent-300: #c7d2fe; --accent-rgb: 99, 102, 241;
            --page-bg: #0b0d1e; --overlay-bg: linear-gradient(135deg, #0b0d1e, #0f172a, #090b1c);
        }
        #bg-overlay { background: var(--overlay-bg) !important; }
        .glass-panel { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .tab-btn.active { background: linear-gradient(135deg, var(--accent-from), var(--accent-to)); color: #fff; box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.3); }
        .tab-btn:not(.active) { color: #94a3b8; }
        .input-field { background-color: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0.75rem; border-radius: 0.5rem; width: 100%; }
        .input-field:focus { border-color: rgba(var(--accent-rgb), 0.5); outline: none; }
        .accent-btn { background: linear-gradient(135deg, var(--accent-from), var(--accent-to)); color: white; border-radius: 0.5rem; padding: 0.75rem; text-align: center; cursor: pointer; transition: 0.2s; }
        .accent-btn:hover { box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.4); }
        .outline-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 0.5rem; padding: 0.75rem; cursor: pointer; transition: 0.2s; }
        .outline-btn:hover { background: rgba(255,255,255,0.1); }
        .file-drop-zone { border: 2px dashed rgba(255,255,255,0.12); border-radius: 0.75rem; padding: 2rem 1rem; text-align: center; cursor: pointer; }
        .img-preview { max-width: 100%; max-height: 200px; border-radius: 0.75rem; margin-top: 0.5rem; }
    </style>
</head>
<body class="min-h-screen relative custom-scrollbar flex flex-col items-center p-6 text-white">
    <div id="bg-overlay" class="fixed inset-0 z-[-10]"></div>

    <main class="w-full max-w-3xl glass-panel rounded-2xl p-8 mt-10 animate-fade-in shadow-2xl z-10">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">Copy Cloud <span style="color: var(--accent-400)">Stego</span></h1>
            <p class="text-slate-300">Robust Block-Steganography & AES-GCM</p>
        </header>

        <div class="flex gap-4 mb-6 border-b border-white/10 pb-4">
            <button id="tab-text" class="tab-btn px-4 py-2 rounded-lg font-medium flex-1 bg-white/5">Hide in Text</button>
            <button id="tab-image" class="tab-btn active px-4 py-2 rounded-lg font-medium flex-1">Hide in Image (Robust)</button>
        </div>

        <section id="section-text" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Public Cover Text</label>
                <textarea id="cover-text" class="input-field" rows="2" placeholder="e.g., Check out this cool article..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Secret Message</label>
                <textarea id="secret-text" class="input-field" rows="2" placeholder="Enter the text you want to hide..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Password</label>
                <input type="password" id="pass-text" class="input-field" placeholder="Secret Key...">
            </div>
            <div class="flex gap-4 pt-2">
                <button onclick="handleTextEncrypt()" class="accent-btn flex-1 font-semibold">Encrypt & Hide</button>
                <button onclick="handleTextDecrypt()" class="outline-btn flex-1 font-semibold">Decrypt Text</button>
            </div>
            <div class="pt-2">
                <label class="block text-sm font-medium mb-1 text-slate-300">Result (Copy this to WhatsApp)</label>
                <textarea id="result-text" readonly class="input-field" rows="3"></textarea>
            </div>
        </section>

        <section id="section-image" class="space-y-4">
            <div style="background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.2); color: var(--accent-400);" class="p-4 rounded-lg text-sm mb-2">
                <strong>🛡️ Algorithm Upgraded:</strong> Now using Differential Block-Luminance. Survives JPEG compression. (Extreme resizing will still break it).
            </div>
            
            <div id="drop-zone" class="file-drop-zone">
                <p class="text-slate-300 mb-2">Click or drag an image here</p>
                <input type="file" id="image-input" accept="image/png, image/jpeg, image/webp" class="hidden">
                <img id="preview-img" class="img-preview hidden mx-auto" alt="Preview">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Secret Message</label>
                <textarea id="secret-img-text" class="input-field" rows="2" placeholder="Message to hide..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">AES Encryption Password (Required)</label>
                <input type="password" id="pass-img" class="input-field" placeholder="Secret Key...">
            </div>

            <div class="flex gap-4 pt-2">
                <button onclick="handleImageEncrypt()" class="accent-btn flex-1 font-semibold">Encrypt & Hide in Blocks</button>
                <button onclick="handleImageDecrypt()" class="outline-btn flex-1 font-semibold">Scan Image Blocks</button>
            </div>
            
            <canvas id="stego-canvas" class="hidden"></canvas>
            <a id="download-link" class="hidden accent-btn text-center block w-full mt-2">Download Image</a>
        </section>
    </main>

    <script>
        // --- UI Logic ---
        document.getElementById('tab-text').addEventListener('click', (e) => {
            e.target.classList.add('active'); document.getElementById('tab-image').classList.remove('active');
            document.getElementById('section-text').classList.remove('hidden'); document.getElementById('section-image').classList.add('hidden');
        });
        document.getElementById('tab-image').addEventListener('click', (e) => {
            e.target.classList.add('active'); document.getElementById('tab-text').classList.remove('active');
            document.getElementById('section-image').classList.remove('hidden'); document.getElementById('section-text').classList.add('hidden');
        });

        // ==========================================
        // AES-GCM ENCRYPTION LOGIC
        // ==========================================
        async function getDerivationKey(password) {
            const enc = new TextEncoder();
            return window.crypto.subtle.importKey("raw", enc.encode(password), {name: "PBKDF2"}, false, ["deriveBits", "deriveKey"]);
        }
        async function getCryptoKey(keyMaterial, salt) {
            return window.crypto.subtle.deriveKey(
                {name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256"},
                keyMaterial, {name: "AES-GCM", length: 256}, true, ["encrypt", "decrypt"]
            );
        }
        async function encryptData(text, password) {
            const salt = window.crypto.getRandomValues(new Uint8Array(16));
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const keyMaterial = await getDerivationKey(password);
            const key = await getCryptoKey(keyMaterial, salt);
            const enc = new TextEncoder();
            const encrypted = await window.crypto.subtle.encrypt({name: "AES-GCM", iv: iv}, key, enc.encode(text));
            
            const payload = new Uint8Array(16 + 12 + encrypted.byteLength);
            payload.set(salt, 0); payload.set(iv, 16); payload.set(new Uint8Array(encrypted), 28);
            
            let binary = '';
            for(let i=0; i<payload.byteLength; i++) binary += String.fromCharCode(payload[i]);
            return btoa(binary);
        }
        async function decryptData(base64Payload, password) {
            try {
                const binary = atob(base64Payload);
                const payload = new Uint8Array(binary.length);
                for(let i=0; i<binary.length; i++) payload[i] = binary.charCodeAt(i);

                const salt = payload.slice(0, 16);
                const iv = payload.slice(16, 28);
                const ciphertext = payload.slice(28);

                const keyMaterial = await getDerivationKey(password);
                const key = await getCryptoKey(keyMaterial, salt);
                const decrypted = await window.crypto.subtle.decrypt({name: "AES-GCM", iv: iv}, key, ciphertext);
                return new TextDecoder().decode(decrypted);
            } catch (e) { throw new Error("Invalid password or severely corrupted data."); }
        }

        // ==========================================
        // ROBUST DIFFERENTIAL BLOCK STEGANOGRAPHY 
        // ==========================================
        const fileInput = document.getElementById('image-input');
        const previewImg = document.getElementById('preview-img');
        const canvas = document.getElementById('stego-canvas');
        const ctx = canvas.getContext('2d');
        let currentImage = null;

        document.getElementById('drop-zone').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.classList.remove('hidden');
                    currentImage = new Image();
                    currentImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Block helper functions
        function getBlockAvgBlue(data, width, startX, startY, size) {
            let sum = 0;
            for(let y=0; y<size; y++) {
                for(let x=0; x<size; x++) {
                    let idx = ((startY+y)*width + (startX+x)) * 4;
                    sum += data[idx+2]; // Blue channel is least sensitive to human eye
                }
            }
            return sum / (size*size);
        }

        function adjustBlockBlue(data, width, startX, startY, size, amount) {
            for(let y=0; y<size; y++) {
                for(let x=0; x<size; x++) {
                    let idx = ((startY+y)*width + (startX+x)) * 4;
                    let val = data[idx+2] + amount;
                    data[idx+2] = Math.max(0, Math.min(255, val));
                }
            }
        }

        async function handleImageEncrypt() {
            if (!currentImage) return alert("Upload an image first.");
            const secret = document.getElementById('secret-img-text').value;
            const pass = document.getElementById('pass-img').value;
            if (!secret || !pass) return alert("Secret message and password required.");

            try {
                // 1. Encrypt text
                const encryptedBase64 = await encryptData(secret, pass);
                
                // 2. Format Payload: [16-bit Header] + [Payload] + [16-bit Footer]
                // Header: 1010101010101010 (Helps locate start)
                // Footer: 1111111111111110 (Helps locate end)
                let msgBin = '1010101010101010'; 
                for (let i = 0; i < encryptedBase64.length; i++) {
                    msgBin += encryptedBase64.charCodeAt(i).toString(2).padStart(8, '0');
                }
                msgBin += '1111111111111110';

                // 3. Setup Canvas & Block Grid
                canvas.width = currentImage.width; 
                canvas.height = currentImage.height;
                ctx.drawImage(currentImage, 0, 0);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;

                // Dynamic block size (min 8px, scales up for larger images to survive resizing better)
                const blockSize = Math.max(8, Math.floor(Math.min(canvas.width, canvas.height) / 64));
                const blocksX = Math.floor(canvas.width / blockSize);
                const blocksY = Math.floor(canvas.height / blockSize);
                const maxBits = Math.floor(blocksX / 2) * blocksY; // 2 blocks needed per bit

                if (msgBin.length > maxBits) {
                    return alert(`Image too small for this message using robust blocks. Max bits: ${maxBits}, Need: ${msgBin.length}`);
                }

                // 4. Embed Data (Differential Modulation)
                const DELTA = 30; // High delta ensures survival through JPEG compression
                let bitIdx = 0;

                for (let y = 0; y < blocksY && bitIdx < msgBin.length; y++) {
                    for (let x = 0; x < blocksX - 1 && bitIdx < msgBin.length; x += 2) {
                        const startXA = x * blockSize;
                        const startXB = (x + 1) * blockSize;
                        const startY = y * blockSize;

                        const avgA = getBlockAvgBlue(data, canvas.width, startXA, startY, blockSize);
                        const avgB = getBlockAvgBlue(data, canvas.width, startXB, startY, blockSize);
                        const diff = avgA - avgB;
                        const bit = msgBin[bitIdx];

                        if (bit === '1') {
                            if (diff < DELTA) {
                                const adjust = (DELTA - diff) / 2 + 2; // +2 for safety margin
                                adjustBlockBlue(data, canvas.width, startXA, startY, blockSize, adjust);
                                adjustBlockBlue(data, canvas.width, startXB, startY, blockSize, -adjust);
                            }
                        } else {
                            if (diff > -DELTA) {
                                const adjust = (diff + DELTA) / 2 + 2;
                                adjustBlockBlue(data, canvas.width, startXA, startY, blockSize, -adjust);
                                adjustBlockBlue(data, canvas.width, startXB, startY, blockSize, adjust);
                            }
                        }
                        bitIdx++;
                    }
                }

                ctx.putImageData(imgData, 0, 0);
                const dlLink = document.getElementById('download-link');
                dlLink.href = canvas.toDataURL('image/png'); // Still export as PNG locally to start clean
                dlLink.download = 'robust_stego_image.png';
                dlLink.classList.remove('hidden');
                dlLink.textContent = "Download Robust Image";
                alert("Embedded securely! This will survive JPEG compression.");

            } catch(e) { alert("Error: " + e.message); }
        }

        async function handleImageDecrypt() {
            if (!currentImage) return alert("Upload stego image first.");
            const pass = document.getElementById('pass-img').value;
            if (!pass) return alert("Password required.");

            canvas.width = currentImage.width; 
            canvas.height = currentImage.height;
            ctx.drawImage(currentImage, 0, 0);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            const blockSize = Math.max(8, Math.floor(Math.min(canvas.width, canvas.height) / 64));
            const blocksX = Math.floor(canvas.width / blockSize);
            const blocksY = Math.floor(canvas.height / blockSize);

            let extractedBits = '';
            
            // 1. Scan the blocks
            for (let y = 0; y < blocksY; y++) {
                for (let x = 0; x < blocksX - 1; x += 2) {
                    const avgA = getBlockAvgBlue(data, canvas.width, x * blockSize, y * blockSize, blockSize);
                    const avgB = getBlockAvgBlue(data, canvas.width, (x + 1) * blockSize, y * blockSize, blockSize);
                    extractedBits += (avgA - avgB > 0) ? '1' : '0';
                }
            }

            // 2. Locate Header and Footer
            const headerIdx = extractedBits.indexOf('1010101010101010');
            if (headerIdx === -1) return alert("No valid hidden data found. The image may have been cropped or resized too heavily.");
            
            const payloadStart = headerIdx + 16;
            const footerIdx = extractedBits.indexOf('1111111111111110', payloadStart);
            const payloadBits = footerIdx !== -1 ? extractedBits.slice(payloadStart, footerIdx) : extractedBits.slice(payloadStart);

            // 3. Convert back to Base64
            let base64Payload = '';
            for (let i = 0; i < payloadBits.length; i += 8) {
                const byte = payloadBits.slice(i, i + 8);
                if(byte.length < 8) break;
                base64Payload += String.fromCharCode(parseInt(byte, 2));
            }

            // 4. Decrypt AES
            try {
                const decryptedText = await decryptData(base64Payload, pass);
                document.getElementById('secret-img-text').value = decryptedText;
                alert("Decrypted successfully!");
            } catch (e) { alert("AES Decryption failed. Wrong password or image data was corrupted by extreme compression."); }
        }

        // --- Text Steganography Logic (Kept for completeness) ---
        const ZW_0 = '\u200B', ZW_1 = '\u200C', ZW_SPACE = '\u200D';
        async function handleTextEncrypt() {
            const cover = document.getElementById('cover-text').value || "Invisible message attached.";
            const secret = document.getElementById('secret-text').value;
            const pass = document.getElementById('pass-text').value;
            if (!secret || !pass) return alert("Secret message and password are required.");
            try {
                const encryptedBase64 = await encryptData(secret, pass);
                let invisibleStr = '';
                for (let char of encryptedBase64.split('').map(c => c.charCodeAt(0).toString(2).padStart(8, '0')).join(' ')) {
                    if (char === '0') invisibleStr += ZW_0; else if (char === '1') invisibleStr += ZW_1; else if (char === ' ') invisibleStr += ZW_SPACE;
                }
                document.getElementById('result-text').value = cover.slice(0, 1) + invisibleStr + cover.slice(1);
                alert("Encrypted & Hidden! Copy the Result.");
            } catch (e) { alert("Encryption failed: " + e.message); }
        }
        async function handleTextDecrypt() {
            const hiddenText = document.getElementById('result-text').value || document.getElementById('cover-text').value;
            const pass = document.getElementById('pass-text').value;
            if (!pass) return alert("Password required to decrypt.");
            let extractedBin = '';
            for (let char of hiddenText) {
                if (char === ZW_0) extractedBin += '0'; else if (char === ZW_1) extractedBin += '1'; else if (char === ZW_SPACE) extractedBin += ' ';
            }
            if (!extractedBin) return alert("No hidden message found.");
            try {
                const base64Payload = extractedBin.split(' ').map(b => String.fromCharCode(parseInt(b, 2))).join('');
                document.getElementById('secret-text').value = await decryptData(base64Payload, pass);
                alert("Decrypted successfully!");
            } catch (e) { alert("Decryption failed. Wrong password?"); }
        }
    </script>
</body>
</html>
