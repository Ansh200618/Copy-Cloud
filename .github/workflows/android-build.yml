name: Build and Release Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Grant execute permission for gradlew
        run: |
          cd apps
          chmod +x gradlew
      
      - name: Build Debug APK
        run: |
          cd apps
          ./gradlew assembleDebug --stacktrace
      
      - name: Build Release APK (unsigned)
        run: |
          cd apps
          ./gradlew assembleRelease --stacktrace
        continue-on-error: true
      
      - name: Get version name
        id: version
        run: |
          VERSION_NAME=$(grep versionName apps/app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME"
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CopyCloud-Debug-APK
          path: apps/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK (if exists)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: CopyCloud-Release-APK
          path: apps/app/build/outputs/apk/release/*.apk
          retention-days: 90
        continue-on-error: true
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apps/app/build/outputs/apk/debug/app-debug.apk
            apps/app/build/outputs/apk/release/*.apk
          body: |
            ## 📱 CopyCloud Android App Release
            
            ### What's Included:
            - ✨ Premium luxury design with 8 themes
            - 📱 Device targeting (8-digit codes)
            - 📋 Local history storage
            - 📷 QR code scanner
            - 🔔 Push notifications
            - 💎 Glassmorphism UI with gold accents
            - 🔗 Device sync support
            
            ### Download:
            - **app-debug.apk**: Development build with debugging
            - **app-release.apk**: Production build (if available)
            
            ### Installation:
            1. Download APK to your Android device
            2. Enable "Install from Unknown Sources"
            3. Open the APK file
            4. Follow installation prompts
            
            **Version**: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Latest Release (on main push)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Development Build
          files: |
            apps/app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## 📱 CopyCloud - Latest Development Build
            
            This is an automated build from the latest commit.
            
            ### Features:
            - ✨ All premium features
            - 🔄 Auto-updated on every push
            - 🐛 May contain experimental features
            
            **Built from**: ${{ github.sha }}
            **Date**: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
